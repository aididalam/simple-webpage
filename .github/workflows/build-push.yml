name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "TAG=main-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: aididalam/simple-webpage:${{ steps.tag.outputs.TAG }}

      - name: Update image tag in gitops repo
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          git clone https://aididalam:$GITOPS_TOKEN@github.com/aididalam/simple-gitops.git
          cd simple-gitops
          sed -i "s|image: aididalam/simple-webpage:.*|image: aididalam/simple-webpage:$TAG|" simple-webpage/deployment.yml
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add simple-webpage/deployment.yml
          git commit -m "ci: update simple-webpage image to $TAG"
          git push
